name: MLX-RFSN Fusion Alpha

on:
  push:
    branches: [main, mlx-rfsn-fusion-cleanup, mlx-rfsn-fusion-alpha-8]
  pull_request:
    branches: [main]

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: python -m compileall -q rfsn_v10 rfsn_v11 tests benchmarks scripts

  cpu-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[dev]"
      - run: |
          PYTHONPATH=. RFSN_BACKEND=numpy RFSN_TELEMETRY_HMAC_KEY=test-secret \
            pytest -q tests -m "not db"

  v11-collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[dev]"
      - run: PYTHONPATH=. pytest -q rfsn_v11/tests || echo "v11 tests: some skipped on CPU"

  candidate-schema:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[dev]"
      - run: |
          PYTHONPATH=. pytest -q \
            tests/benchmarks/test_candidate_result_schema.py \
            tests/benchmarks/test_candidate_registry.py \
            tests/benchmarks/test_memory_metrics.py \
            tests/benchmarks/test_logit_metrics.py \
            tests/benchmarks/test_rfsn_v11_cache_injection_contract.py

  benchmark-quick:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[dev]"
      - run: |
          PYTHONPATH=. python benchmarks/kv_shootout.py --quick || echo "Quick benchmark: skipped (no MLX on runner)"

  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip build
      - run: python -m build
      - run: python -m pip install --force-reinstall dist/*.whl
      - run: python -c "import rfsn_v10, rfsn_v11; print('ok')"
